apiVersion: batch/v1
kind: CronJob
metadata:
  name: work-boots-seo-competitor-profile-retention
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: retention-cleanup
              image: us-central1-docker.pkg.dev/PROJECT_ID/work-boots/api:latest
              imagePullPolicy: IfNotPresent
              command:
                - "python"
                - "-m"
                - "app.cli.seo_competitor_profile_generation_retention_cleanup"
              envFrom:
                - configMapRef:
                    name: work-boots-config
                - secretRef:
                    name: work-boots-secrets
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "250m"
                  memory: "512Mi"
