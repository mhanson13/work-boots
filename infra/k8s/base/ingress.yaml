apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: work-boots-ingress
  annotations:
    kubernetes.io/ingress.class: gce
    # Placeholder/example static IP name. Overlays should patch this per environment.
    kubernetes.io/ingress.global-static-ip-name: work-boots-static-ip
    # Placeholder/example managed certificate resource name.
    networking.gke.io/managed-certificates: work-boots-managed-cert
    networking.gke.io/v1beta1.FrontendConfig: work-boots-frontend-config
spec:
  rules:
    - host: app.mbsrn.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mbsrn-api
                port:
                  number: 80
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: mbsrn-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mbsrn-ui
                port:
                  number: 80
