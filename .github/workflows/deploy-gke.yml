name: deploy-gke

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment overlay"
        required: true
        default: "prod"
        type: choice
        options: ["dev", "prod"]
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "frontend/operator-ui/**"
      - "infra/k8s/**"
      - ".github/workflows/deploy-gke.yml"

concurrency:
  group: deploy-gke-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

jobs:
  backend-build:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.publish.outputs.image_uri }}
    env:
      GCP_PROJECT_ID: work-boots
      CONTAINER_REGISTRY_REGION: ${{ secrets.CONTAINER_REGISTRY_REGION }}
      CONTAINER_REGISTRY_REPOSITORY: ${{ secrets.CONTAINER_REGISTRY_REPOSITORY }}
      BUILD_SOURCE_DIR: ${{ secrets.BUILD_SOURCE_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run backend tests
        run: pytest

      - name: Validate build environment
        shell: bash
        run: |
          set -euo pipefail
          echo "GCP_PROJECT_ID=${GCP_PROJECT_ID:-<empty>}"
          echo "CONTAINER_REGISTRY_REGION_SET=$([ -n \"${CONTAINER_REGISTRY_REGION//[[:space:]]/}\" ] && echo true || echo false)"
          echo "CONTAINER_REGISTRY_REPOSITORY_SET=$([ -n \"${CONTAINER_REGISTRY_REPOSITORY//[[:space:]]/}\" ] && echo true || echo false)"
          echo "BUILD_SOURCE_DIR_SET=$([ -n \"${BUILD_SOURCE_DIR//[[:space:]]/}\" ] && echo true || echo false)"
          if [ -z "${GCP_PROJECT_ID//[[:space:]]/}" ]; then
            echo "::error::GCP_PROJECT_ID is empty."
            exit 1
          fi
          if [ -z "${CONTAINER_REGISTRY_REGION//[[:space:]]/}" ]; then
            echo "::error::CONTAINER_REGISTRY_REGION is empty. Set GitHub secret CONTAINER_REGISTRY_REGION."
            exit 1
          fi
          if [ -z "${CONTAINER_REGISTRY_REPOSITORY//[[:space:]]/}" ]; then
            echo "::error::CONTAINER_REGISTRY_REPOSITORY is empty. Set GitHub secret CONTAINER_REGISTRY_REPOSITORY."
            exit 1
          fi
          if [ -z "${BUILD_SOURCE_DIR//[[:space:]]/}" ]; then
            echo "::error::BUILD_SOURCE_DIR is empty. Set GitHub secret BUILD_SOURCE_DIR."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.OIDC_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push API image (Cloud Buildpacks)
        id: publish
        run: |
          IMAGE_URI="${CONTAINER_REGISTRY_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${CONTAINER_REGISTRY_REPOSITORY}/api:${GITHUB_SHA}"
          gcloud builds submit --project="${GCP_PROJECT_ID}" --gcs-source-staging-dir="${BUILD_SOURCE_DIR}" --pack image="${IMAGE_URI}" .
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  frontend-build:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.publish.outputs.image_uri }}
    env:
      GCP_PROJECT_ID: work-boots
      CONTAINER_REGISTRY_REGION: ${{ secrets.CONTAINER_REGISTRY_REGION }}
      CONTAINER_REGISTRY_REPOSITORY: ${{ secrets.CONTAINER_REGISTRY_REPOSITORY }}
      BUILD_SOURCE_DIR: ${{ secrets.BUILD_SOURCE_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/operator-ui/package-lock.json"

      - name: Ensure lockfile for npm ci
        working-directory: frontend/operator-ui
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::warning::package-lock.json missing. Generating ephemeral lockfile for CI. Commit the lockfile for fully reproducible local installs."
            npm install --package-lock-only --ignore-scripts
          fi

      - name: Install frontend dependencies (deterministic)
        working-directory: frontend/operator-ui
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend/operator-ui
        run: npm run lint

      - name: Run frontend typecheck
        working-directory: frontend/operator-ui
        run: npm run typecheck

      - name: Run frontend build
        working-directory: frontend/operator-ui
        run: npm run build

      - name: Validate build environment
        shell: bash
        run: |
          set -euo pipefail
          echo "GCP_PROJECT_ID=${GCP_PROJECT_ID:-<empty>}"
          echo "CONTAINER_REGISTRY_REGION_SET=$([ -n \"${CONTAINER_REGISTRY_REGION//[[:space:]]/}\" ] && echo true || echo false)"
          echo "CONTAINER_REGISTRY_REPOSITORY_SET=$([ -n \"${CONTAINER_REGISTRY_REPOSITORY//[[:space:]]/}\" ] && echo true || echo false)"
          echo "BUILD_SOURCE_DIR_SET=$([ -n \"${BUILD_SOURCE_DIR//[[:space:]]/}\" ] && echo true || echo false)"
          if [ -z "${GCP_PROJECT_ID//[[:space:]]/}" ]; then
            echo "::error::GCP_PROJECT_ID is empty."
            exit 1
          fi
          if [ -z "${CONTAINER_REGISTRY_REGION//[[:space:]]/}" ]; then
            echo "::error::CONTAINER_REGISTRY_REGION is empty. Set GitHub secret CONTAINER_REGISTRY_REGION."
            exit 1
          fi
          if [ -z "${CONTAINER_REGISTRY_REPOSITORY//[[:space:]]/}" ]; then
            echo "::error::CONTAINER_REGISTRY_REPOSITORY is empty. Set GitHub secret CONTAINER_REGISTRY_REPOSITORY."
            exit 1
          fi
          if [ -z "${BUILD_SOURCE_DIR//[[:space:]]/}" ]; then
            echo "::error::BUILD_SOURCE_DIR is empty. Set GitHub secret BUILD_SOURCE_DIR."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.OIDC_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push UI image (Cloud Buildpacks)
        id: publish
        run: |
          IMAGE_URI="${CONTAINER_REGISTRY_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${CONTAINER_REGISTRY_REPOSITORY}/ui:${GITHUB_SHA}"
          gcloud builds submit --project="${GCP_PROJECT_ID}" --gcs-source-staging-dir="${BUILD_SOURCE_DIR}" --pack image="${IMAGE_URI}" frontend/operator-ui
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  deploy:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs:
      - backend-build
      - frontend-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      TARGET_OVERLAY: ${{ github.event.inputs.environment || 'prod' }}
      GCP_PROJECT_ID: work-boots
      KUBERNETES_CLUSTER_NAME: ${{ secrets.KUBERNETES_CLUSTER_NAME }}
      KUBERNETES_CLUSTER_REGION: ${{ secrets.KUBERNETES_CLUSTER_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deploy environment
        shell: bash
        run: |
          set -euo pipefail
          echo "GCP_PROJECT_ID=${GCP_PROJECT_ID:-<empty>}"
          echo "KUBERNETES_CLUSTER_NAME_SET=$([ -n \"${KUBERNETES_CLUSTER_NAME//[[:space:]]/}\" ] && echo true || echo false)"
          echo "KUBERNETES_CLUSTER_REGION_SET=$([ -n \"${KUBERNETES_CLUSTER_REGION//[[:space:]]/}\" ] && echo true || echo false)"
          if [ -z "${GCP_PROJECT_ID//[[:space:]]/}" ]; then
            echo "::error::GCP_PROJECT_ID is empty."
            exit 1
          fi
          if [ -z "${KUBERNETES_CLUSTER_NAME//[[:space:]]/}" ]; then
            echo "::error::KUBERNETES_CLUSTER_NAME is empty. Set GitHub secret KUBERNETES_CLUSTER_NAME."
            exit 1
          fi
          if [ -z "${KUBERNETES_CLUSTER_REGION//[[:space:]]/}" ]; then
            echo "::error::KUBERNETES_CLUSTER_REGION is empty. Set GitHub secret KUBERNETES_CLUSTER_REGION."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.OIDC_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl for GKE
        run: |
          gcloud container clusters get-credentials "${KUBERNETES_CLUSTER_NAME}" --region "${KUBERNETES_CLUSTER_REGION}" --project "${GCP_PROJECT_ID}"

      - name: Resolve deployment namespace
        id: target
        run: |
          NAMESPACE="work-boots"
          if [ "${TARGET_OVERLAY}" = "dev" ]; then
            NAMESPACE="work-boots-dev"
          fi
          echo "namespace=${NAMESPACE}" >> "$GITHUB_OUTPUT"

      - name: Apply kustomize overlay
        run: |
          kubectl apply -k "infra/k8s/overlays/${TARGET_OVERLAY}"

      - name: Run Alembic migrations (pre-rollout gate)
        env:
          NAMESPACE: ${{ steps.target.outputs.namespace }}
          API_IMAGE: ${{ needs.backend-build.outputs.image_uri }}
        run: |
          MIGRATION_JOB="work-boots-migrate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cat <<EOF | kubectl -n "${NAMESPACE}" apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${MIGRATION_JOB}
          spec:
            ttlSecondsAfterFinished: 600
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: ${API_IMAGE}
                    command: ["alembic", "upgrade", "head"]
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "256Mi"
                      limits:
                        cpu: "250m"
                        memory: "512Mi"
                    envFrom:
                      - configMapRef:
                          name: work-boots-config
                      - secretRef:
                          name: work-boots-secrets
          EOF

          if ! kubectl -n "${NAMESPACE}" wait --for=condition=complete --timeout=10m "job/${MIGRATION_JOB}"; then
            kubectl -n "${NAMESPACE}" logs "job/${MIGRATION_JOB}" --all-containers=true || true
            exit 1
          fi

      - name: Cleanup migration job
        if: always()
        env:
          NAMESPACE: ${{ steps.target.outputs.namespace }}
        run: |
          MIGRATION_JOB="work-boots-migrate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          kubectl -n "${NAMESPACE}" delete job "${MIGRATION_JOB}" --ignore-not-found

      - name: Update deployment images
        run: |
          NAMESPACE="${{ steps.target.outputs.namespace }}"
          API_IMAGE="${{ needs.backend-build.outputs.image_uri }}"
          UI_IMAGE="${{ needs.frontend-build.outputs.image_uri }}"
          kubectl -n "${NAMESPACE}" set image deployment/work-boots-api api="${API_IMAGE}"
          kubectl -n "${NAMESPACE}" set image deployment/work-boots-ui ui="${UI_IMAGE}"

      - name: Verify rollout
        run: |
          NAMESPACE="${{ steps.target.outputs.namespace }}"
          kubectl -n "${NAMESPACE}" rollout status deployment/work-boots-api --timeout=5m
          kubectl -n "${NAMESPACE}" rollout status deployment/work-boots-ui --timeout=5m
