name: backend-ci

on:
  pull_request:
    paths:
      - "app/**"
      - "scripts/gbp_verification_contract_guard.py"
      - "docs/contracts/gbp-verification-contract.schema.json"
      - "frontend/operator-ui/lib/api/types.ts"
      - "alembic/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "scripts/gbp_verification_contract_guard.py"
      - "docs/contracts/gbp-verification-contract.schema.json"
      - "frontend/operator-ui/lib/api/types.ts"
      - "alembic/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/backend-ci.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: work_boots_console_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d work_boots_console_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: ci
      ENVIRONMENT: ci
      DB_AUTO_CREATE_LOCAL: "false"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/work_boots_console_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Verify GBP verification contract drift guard
        run: |
          python scripts/gbp_verification_contract_guard.py --check

      - name: Run ruff checks (scoped)
        run: |
          # Initial hardening scope: security/session/runtime entrypoints.
          ruff check \
            app/main.py \
            app/core/config.py \
            app/core/rate_limit.py \
            app/core/session_state.py \
            app/core/session_token.py \
            app/integrations/google_auth.py

      - name: Run black format check (scoped)
        run: |
          black --check \
            app/main.py \
            app/core/config.py \
            app/core/rate_limit.py \
            app/core/session_state.py \
            app/core/session_token.py \
            app/integrations/google_auth.py

      - name: Run mypy type checks (scoped)
        run: |
          # Keep initial mypy scope narrow and maintainable; expand incrementally.
          mypy app/core/config.py

      - name: Validate Alembic migration chain
        run: |
          alembic upgrade head

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml
