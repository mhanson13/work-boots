name: frontend-ci

on:
  pull_request:
    paths:
      - "frontend/operator-ui/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "frontend/operator-ui/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/operator-ui/package-lock.json"

      - name: Ensure lockfile for npm ci
        working-directory: frontend/operator-ui
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::warning::package-lock.json missing. Generating ephemeral lockfile for CI. Commit the lockfile for fully reproducible local installs."
            npm install --package-lock-only --ignore-scripts
          fi

      - name: Install dependencies (deterministic)
        working-directory: frontend/operator-ui
        run: npm ci

      - name: Run lint
        working-directory: frontend/operator-ui
        run: npm run lint

      - name: Run typecheck
        working-directory: frontend/operator-ui
        run: npm run typecheck

      - name: Frontend tests status
        working-directory: frontend/operator-ui
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm run test --if-present
          else
            echo "No frontend automated tests script is currently defined; CI enforces lint, typecheck, and build."
          fi

      - name: Build UI
        working-directory: frontend/operator-ui
        run: npm run build
