apiVersion: batch/v1
kind: Job
metadata:
  name: mbsrn-api-migrate
  namespace: mbsrn
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: mbsrn-api
      restartPolicy: Never
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port=5432"
            - "$(CLOUD_SQL_INSTANCE_CONNECTION_NAME)"
          env:
            - name: CLOUD_SQL_INSTANCE_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: CLOUD_SQL_INSTANCE_CONNECTION_NAME
      containers:
        - name: migrate
          image: __API_IMAGE__
          args: ["migrate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: DATABASE_URL
