apiVersion: batch/v1
kind: CronJob
metadata:
  name: mbsrn-seo-competitor-profile-retention
  namespace: mbsrn
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: mbsrn-api
          restartPolicy: Never
          initContainers:
            - name: cloud-sql-proxy
              image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
              restartPolicy: Always
              args:
                - "--structured-logs"
                - "--port=5432"
                - "$(CLOUD_SQL_INSTANCE_CONNECTION_NAME)"
              env:
                - name: CLOUD_SQL_INSTANCE_CONNECTION_NAME
                  valueFrom:
                    secretKeyRef:
                      name: mbsrn-api-auth
                      key: CLOUD_SQL_INSTANCE_CONNECTION_NAME
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                  ephemeral-storage: "256Mi"
                limits:
                  cpu: "250m"
                  memory: "256Mi"
                  ephemeral-storage: "512Mi"
          containers:
            - name: retention-cleanup
              image: __API_IMAGE__
              command:
                - "python"
                - "-m"
                - "app.cli.seo_competitor_profile_generation_retention_cleanup"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: mbsrn-api-auth
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: "200m"
                  memory: "256Mi"
                  ephemeral-storage: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
                  ephemeral-storage: "512Mi"
