apiVersion: batch/v1
kind: Job
metadata:
  name: mbsrn-api-migrate-baseline
  namespace: mbsrn
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: mbsrn-api
      restartPolicy: Never
      containers:
        - name: align
          image: __API_IMAGE__
          command: ["/cnb/process/migrate-baseline-existing"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: DATABASE_URL
          resources:
            requests:
              cpu: __DEPLOY_CPU_REQUEST__
              memory: __DEPLOY_MEMORY_REQUEST__
              ephemeral-storage: __DEPLOY_EPHEMERAL_STORAGE_REQUEST__
            limits:
              cpu: __DEPLOY_CPU_LIMIT__
              memory: __DEPLOY_MEMORY_LIMIT__
              ephemeral-storage: __DEPLOY_EPHEMERAL_STORAGE_LIMIT__
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--structured-logs"
            - "--port=5432"
            - "$(CLOUD_SQL_INSTANCE_CONNECTION_NAME)"
          env:
            - name: CLOUD_SQL_INSTANCE_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: CLOUD_SQL_INSTANCE_CONNECTION_NAME
          resources:
            requests:
              cpu: __DEPLOY_PROXY_CPU_REQUEST__
              memory: __DEPLOY_PROXY_MEMORY_REQUEST__
              ephemeral-storage: __DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST__
            limits:
              cpu: __DEPLOY_PROXY_CPU_LIMIT__
              memory: __DEPLOY_PROXY_MEMORY_LIMIT__
              ephemeral-storage: __DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT__
