apiVersion: apps/v1
kind: Deployment
metadata:
  name: mbsrn-api
  namespace: mbsrn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mbsrn-api
  template:
    metadata:
      labels:
        app: mbsrn-api
    spec:
      serviceAccountName: mbsrn-api
      containers:
        - name: mbsrn-api
          image: __API_IMAGE__
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: DB_AUTO_CREATE_LOCAL
              value: "false"
            - name: GOOGLE_AUTH_ENABLED
              value: "true"
            - name: GOOGLE_OIDC_CLIENT_ID
              value: __GOOGLE_OIDC_CLIENT_ID__
            - name: GOOGLE_OAUTH_CLIENT_ID
              value: __GOOGLE_OAUTH_CLIENT_ID__
            - name: GOOGLE_BUSINESS_PROFILE_REDIRECT_URI
              value: __GOOGLE_BUSINESS_PROFILE_REDIRECT_URI__
            - name: APP_SESSION_ISSUER
              value: mbsrn-console
            - name: APP_SESSION_AUDIENCE
              value: mbsrn-api
            - name: APP_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: APP_SESSION_SECRET
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: GOOGLE_OAUTH_CLIENT_SECRET
          resources:
            requests:
              cpu: __API_CPU_REQUEST__
              memory: __API_MEMORY_REQUEST__
              ephemeral-storage: __API_EPHEMERAL_STORAGE_REQUEST__
            limits:
              cpu: __API_CPU_LIMIT__
              memory: __API_MEMORY_LIMIT__
              ephemeral-storage: __API_EPHEMERAL_STORAGE_LIMIT__
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
