apiVersion: apps/v1
kind: Deployment
metadata:
  name: mbsrn-api
  namespace: mbsrn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mbsrn-api
  template:
    metadata:
      labels:
        app: mbsrn-api
    spec:
      containers:
        - name: mbsrn-api
          image: __API_IMAGE__
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: DB_AUTO_CREATE_LOCAL
              value: "false"
          resources:
            requests:
              cpu: __API_CPU_REQUEST__
              memory: __API_MEMORY_REQUEST__
              ephemeral-storage: __API_EPHEMERAL_STORAGE_REQUEST__
            limits:
              cpu: __API_CPU_LIMIT__
              memory: __API_MEMORY_LIMIT__
              ephemeral-storage: __API_EPHEMERAL_STORAGE_LIMIT__
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
